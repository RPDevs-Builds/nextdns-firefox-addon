name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 1'

permissions: read-all

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@eef6142766c827365c40131433f524aeefef9662 # v4.1.0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@6bb03432bb3f90b107bc6f22660d0295d73b068e # v3.25.10
      with:
        languages: ${{ matrix.language }}

    - name: Autobuild
      uses: github/codeql-action/autobuild@6bb03432bb3f90b107bc6f22660d0295d73b068e # v3.25.10

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@6bb03432bb3f90b107bc6f22660d0295d73b068e # v3.25.10
      with:
        category: "/language:${{ matrix.language }}"
