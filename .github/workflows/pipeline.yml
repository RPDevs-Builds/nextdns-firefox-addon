name: Extension Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Tests
        run: NODE_OPTIONS="--experimental-vm-modules" npm test

      - name: Build XPI
        run: npm run build

      - name: AMO Compliance Lint
        run: npm run lint:addon

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dns-forge-xpi
          path: web-ext-artifacts/
          retention-days: 5

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dns-forge-xpi
          path: release-artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          generate_release_notes: true
