name: Extension Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all


env:
  ANDROID_SDK_ROOT: /mnt/sharedroot/github_runners/shared/android-sdk
  CARGO_HOME: /mnt/sharedroot/github_runners/shared/cargo-home
  GOCACHE: /mnt/sharedroot/github_runners/shared/go-cache
  PIP_CACHE_DIR: /mnt/sharedroot/github_runners/shared/pip-cache
  POETRY_CACHE_DIR: /mnt/sharedroot/github_runners/shared/poetry-cache
  NPM_CONFIG_CACHE: /mnt/sharedroot/github_runners/shared/npm-cache
  CCACHE_DIR: /mnt/sharedroot/github_runners/shared/ccache
  DOCKER_CONFIG: /mnt/sharedroot/github_runners/shared/docker-cache

jobs:
  pipeline:
    runs-on: [self-hosted, linux64]
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Tests
        run: NODE_OPTIONS="--experimental-vm-modules" npm test

      - name: Build XPI
        run: npm run build

      - name: AMO Compliance Lint
        run: npm run lint:addon

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dns-forge-xpi
          path: web-ext-artifacts/
          retention-days: 5

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pipeline
    runs-on: [self-hosted, linux64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          name: dns-forge-xpi
          path: release-artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release-artifacts/*
          generate_release_notes: true
