name: Extension Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions: read-all

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@eef6142766c827365c40131433f524aeefef9662 # v4.1.0

      - name: Use Node.js
        uses: actions/setup-node@0a44ba7841725637a1993d5e35e29a26031133f6 # v4.0.4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Tests
        run: NODE_OPTIONS="--experimental-vm-modules" npm test

      - name: Build XPI
        run: npm run build

      - name: AMO Compliance Lint
        run: npm run lint:addon

      - name: Upload Artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea23f8d10f0974f0d015248fc # v4.4.3
        with:
          name: dns-forge-xpi
          path: web-ext-artifacts/
          retention-days: 5

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@eef6142766c827365c40131433f524aeefef9662 # v4.1.0
      - name: Download Artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372da98ade0 # v4.1.7
        with:
          name: dns-forge-xpi
          path: release-artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@c062e08bd570ca97464467ad03b29c915a13727a # v2.0.8
        with:
          files: release-artifacts/*
          generate_release_notes: true
