name: Extension Pipeline
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Jest Tests
        run: npm test

      - name: Build XPI
        run: npm run build

      - name: AMO Compliance Lint
        run: npm run lint:addon

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dns-forge-v${{ github.sha }}
          path: web-ext-artifacts/*.xpi
