<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DNS Forge - Data Manager</title>
  <style>
    :root {
      --bg-main: #0f172a;
      --bg-panel: #1e293b;
      --border-color: #334155;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #4facf7;
      --deny: #ef4444;
      --allow: #22c55e;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 10px;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab-btn {
      padding: 8px 16px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 4px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
    }
    .search-bar {
      width: 100%;
      padding: 10px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 4px;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    .list-container {
      background: var(--bg-panel);
      border-radius: 4px;
      border: 1px solid var(--border-color);
    }
    .list-item {
      padding: 15px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .list-item:last-child {
      border-bottom: none;
    }
    .item-info {
      flex-grow: 1;
      padding-right: 20px;
    }
    .item-title {
      font-weight: bold;
      margin-bottom: 4px;
    }
    .item-desc {
      font-size: 0.9em;
      color: var(--text-muted);
      font-style: italic;
    }
    .btn {
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-size: 0.9em;
      color: white;
    }
    .btn-edit { background: var(--accent); }
    .btn-delete { background: var(--deny); }
    .btn-add { background: var(--allow); margin-bottom: 20px; }
    
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: var(--bg-panel);
      padding: 20px;
      border-radius: 8px;
      width: 400px;
      max-width: 90%;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      border-radius: 4px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Data Manager</h1>
    </div>

    <div class="tabs">
      <button id="tab-domains" class="tab-btn">Domain Descriptions</button>
      <button id="tab-profiles" class="tab-btn">Profile Notes</button>
      <button id="tab-filters" class="tab-btn">Filtered Domains</button>
    </div>

    <button id="add-btn" class="btn btn-add">+ Add New</button>
    <input type="text" id="search-input" class="search-bar" placeholder="Search...">

    <div id="list-container" class="list-container">
      <!-- Items will be rendered here -->
    </div>
  </div>

  <div id="edit-modal" class="modal">
    <div class="modal-content">
      <h2 id="modal-title">Edit Entry</h2>
      <label id="label-key" style="display:block; margin-bottom:5px; font-size:0.9em;"></label>
      <input type="text" id="input-key" placeholder="Domain or Profile ID">
      <select id="select-profile" style="display:none; width:100%; padding:8px; margin-bottom:10px; background:var(--bg-main); border:1px solid var(--border-color); color:var(--text-main); border-radius:4px; box-sizing:border-box;">
        <option value="">Loading profiles...</option>
      </select>
      <label style="display:block; margin-bottom:5px; font-size:0.9em;">Note</label>
      <textarea id="input-note" rows="4" placeholder="Enter note..."></textarea>
      <div style="display: flex; gap: 10px; justify-content: flex-end;">
        <button id="cancel-btn" class="btn btn-delete" style="background:#64748b;">Cancel</button>
        <button id="save-btn" class="btn btn-edit">Save</button>
      </div>
    </div>
  </div>

  <script src="viewer.js"></script>
</body>
</html>
